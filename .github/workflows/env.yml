name: env demo
on: 
 workflow_dispatch:
   inputs:
     environment:
       description: choose the env to run the workflow
       required: false
       default: dev
       type: choice
       options:
         - dev
         - test
         - prod
jobs:
  env-job:
    runs-on: self-hosted
    steps:
      - name: print name of the environment
        run: echo " the env is ${{inputs.environment}}"
