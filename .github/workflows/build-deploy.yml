name: build and deploy
on:
 push:
   branches:
     - main
 pull_request:
   types:
     - opened
     - synchronize
jobs:
  build-job:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: build step
        run : echo "building the job"
  deploy-job:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: deploy step
        run: echo "deploying the job from main"

  
