name: if example workflow
on:
  push:
    branches:
        - main
        - develop
        - feature/**
jobs:
  quality-checks:
    if: startsWith(github.ref_name,'feature') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: perform code quality
        run: echo "performing quality checks on the code"
  dev-deploy:
    if: github.ref_name == 'develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: deploy code to dev
        run: echo "deploying to dev"
  prod-deploy:
    if: github.ref_name == 'main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: deploy to prod
        run: echo "deploying to prod"
  success-notify:
    runs-on: ubuntu-latest
    needs: ['quality-checks','dev-deploy','prod-deploy']
    if: always() && !failure()
    steps:
        - name: success
          run: echo "the workflow is succeeded"
  failure-notify:
    runs-on: ubuntu-latest
    needs: ['quality-checks','dev-deploy','prod-deploy']
    if: failure()
    steps:
        - name: failure
          run: echo "failure notification sent"